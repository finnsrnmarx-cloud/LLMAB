name: LLMAB

options:
  bundleIdPrefix: org.llmab
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  xcodeVersion: "15.0"

packages:
  # Local SwiftPM workspace at the repo root. Every library product
  # (LLMCore, ModelRegistry, runtimes, UIKitOmega, AgentKit, MediaKit)
  # is consumed through this single reference.
  LLMAB:
    path: .

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEAD_CODE_STRIPPING: YES
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES

targets:
  LLMABApp:
    type: application
    platform: macOS
    sources:
      - path: apps/LLMAB-macOS/Sources/LLMABApp
    resources:
      - path: apps/LLMAB-macOS/Resources
    info:
      path: apps/LLMAB-macOS/Info.plist
    entitlements:
      path: apps/LLMAB-macOS/LLMAB.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.llmab.omega
        PRODUCT_NAME: LLMAB
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        # Ad-hoc sign for dev; `scripts/package.sh` overrides
        # CODE_SIGN_IDENTITY with the Developer ID cert at release.
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        # Sandbox intentionally off — the Code and Agents tabs need
        # unrestricted filesystem + exec access. A sandboxed MAS
        # variant will land as a separate target post-v1.
        ENABLE_APP_SANDBOX: NO
    dependencies:
      - package: LLMAB
        product: LLMCore
      - package: LLMAB
        product: ModelRegistry
      - package: LLMAB
        product: RuntimeOllama
      - package: LLMAB
        product: RuntimeMLX
      - package: LLMAB
        product: RuntimeLlamaCpp
      - package: LLMAB
        product: AgentKit
      - package: LLMAB
        product: MediaKit
      - package: LLMAB
        product: UIKitOmega
