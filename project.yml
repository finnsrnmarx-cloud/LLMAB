name: LLMAB

options:
  bundleIdPrefix: org.llmab
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  xcodeVersion: "15.0"

packages:
  # Local SwiftPM workspace at the repo root. Every library product
  # (LLMCore, ModelRegistry, runtimes, UIKitOmega, AgentKit, MediaKit)
  # is consumed through this single reference.
  LLMAB:
    path: .

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEAD_CODE_STRIPPING: YES
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES

targets:
  LLMABApp:
    type: application
    platform: macOS
    sources:
      - path: apps/LLMAB-macOS/Sources/LLMABApp
    resources:
      - path: apps/LLMAB-macOS/Resources
    postBuildScripts:
      - name: Strip signing metadata
        basedOnDependencyAnalysis: false
        script: |
          "${SRCROOT}/scripts/normalize-macos-metadata.sh" \
            "${SRCROOT}/apps/LLMAB-macOS" \
            "${TARGET_BUILD_DIR}/${FULL_PRODUCT_NAME}"
    # NOTE: we deliberately do NOT use the top-level `info: path:` or
    # `entitlements: path:` keys here — XcodeGen interprets both as
    # "synthesise a fresh plist at this path at generate time", which
    # clobbers our carefully-authored files (privacy usage strings in
    # Info.plist, camera/mic/speech keys in LLMAB.entitlements).
    # Previous run showed only `get-task-allow` in the signed bundle
    # because of this — our actual entitlements never shipped.
    # Instead, point xcodebuild at the checked-in files via the
    # INFOPLIST_FILE / CODE_SIGN_ENTITLEMENTS build settings below,
    # and keep GENERATE_INFOPLIST_FILE=NO so the build system doesn't
    # re-synthesise them at archive time either.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.llmab.omega
        PRODUCT_NAME: LLMAB
        INFOPLIST_FILE: apps/LLMAB-macOS/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: apps/LLMAB-macOS/LLMAB.entitlements
        # Dock icon: `AppIcon.icns` is generated from
        # assets/brand/app-icon.svg by scripts/make-icon.sh.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Sandbox intentionally off — the Code and Agents tabs need
        # unrestricted filesystem + exec access. A sandboxed MAS
        # variant will land as a separate target post-v1.
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        # `--deep` makes codesign recursively sign every binary inside
        # the bundle, including the outer `MacOS/LLMAB` stub launcher
        # that Xcode 17's debug-dylib pattern leaves adhoc-unsigned
        # (the root cause of the previous "code object is not signed
        # at all" error).
        OTHER_CODE_SIGN_FLAGS: --deep
      configs:
        # Debug (local `make run-app` / Xcode ⌘R):
        #   - Hardened runtime off (notarisation requirement only).
        #   - ENABLE_DEBUG_DYLIB / ENABLE_DEBUG_DYLIB_SUPPORT both off —
        #     Apple renamed the setting between Xcode versions; set both
        #     to be safe.
        Debug:
          ENABLE_HARDENED_RUNTIME: NO
          ENABLE_DEBUG_DYLIB: NO
          ENABLE_DEBUG_DYLIB_SUPPORT: NO
        # Release (make package / xcodebuild archive via scripts/
        # package.sh): hardened runtime on, as notarisation requires.
        Release:
          ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: LLMAB
        product: LLMCore
      - package: LLMAB
        product: ModelRegistry
      - package: LLMAB
        product: RuntimeOllama
      - package: LLMAB
        product: RuntimeMLX
      - package: LLMAB
        product: RuntimeLlamaCpp
      - package: LLMAB
        product: RuntimeOpenAICompatible
      - package: LLMAB
        product: AgentKit
      - package: LLMAB
        product: MediaKit
      - package: LLMAB
        product: UIKitOmega
