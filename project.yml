name: LLMAB

options:
  bundleIdPrefix: org.llmab
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  xcodeVersion: "15.0"

packages:
  # Local SwiftPM workspace at the repo root. Every library product
  # (LLMCore, ModelRegistry, runtimes, UIKitOmega, AgentKit, MediaKit)
  # is consumed through this single reference.
  LLMAB:
    path: .

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEAD_CODE_STRIPPING: YES
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES

targets:
  LLMABApp:
    type: application
    platform: macOS
    sources:
      - path: apps/LLMAB-macOS/Sources/LLMABApp
    resources:
      - path: apps/LLMAB-macOS/Resources
    # NOTE: we deliberately do NOT use the `info: path:` key here —
    # XcodeGen interprets that as "synthesise a fresh Info.plist at
    # this path at generate time", which would wipe the privacy usage
    # strings we've painstakingly written (and produce an app that
    # TCC-crashes the moment the Video tab asks for camera access).
    # Instead, point xcodebuild at the checked-in file via the
    # INFOPLIST_FILE build setting below, and keep
    # GENERATE_INFOPLIST_FILE=NO so the build system doesn't clobber
    # it at archive time either.
    entitlements:
      path: apps/LLMAB-macOS/LLMAB.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.llmab.omega
        PRODUCT_NAME: LLMAB
        INFOPLIST_FILE: apps/LLMAB-macOS/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        # Dock icon: `AppIcon.icns` is generated from
        # assets/brand/app-icon.svg by scripts/make-icon.sh.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Sandbox intentionally off — the Code and Agents tabs need
        # unrestricted filesystem + exec access. A sandboxed MAS
        # variant will land as a separate target post-v1.
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
      configs:
        # Debug (local `make run-app` / Xcode ⌘R):
        #   - ENABLE_HARDENED_RUNTIME=NO — hardened runtime is a
        #     notarisation requirement, not a debug one, and combining it
        #     with ad-hoc `-` identity + Xcode 17's new stub executor is
        #     known-broken.
        #   - ENABLE_DEBUG_DYLIB_SUPPORT=NO — turn off Xcode 17's
        #     "launcher + debug dylib" split that causes the
        #     "code object is not signed at all" codesign failure on
        #     the outer MacOS/LLMAB stub. Traditional single-binary
        #     debug builds sign cleanly.
        Debug:
          ENABLE_HARDENED_RUNTIME: NO
          ENABLE_DEBUG_DYLIB_SUPPORT: NO
        # Release (make package / xcodebuild archive via scripts/
        # package.sh): Developer ID signing + hardened runtime on, as
        # Apple requires for notarised distribution.
        Release:
          ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: LLMAB
        product: LLMCore
      - package: LLMAB
        product: ModelRegistry
      - package: LLMAB
        product: RuntimeOllama
      - package: LLMAB
        product: RuntimeMLX
      - package: LLMAB
        product: RuntimeLlamaCpp
      - package: LLMAB
        product: AgentKit
      - package: LLMAB
        product: MediaKit
      - package: LLMAB
        product: UIKitOmega
