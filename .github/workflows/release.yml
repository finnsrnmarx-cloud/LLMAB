name: Release (DMG)

# Triggered by pushing a `v*` tag. Builds, signs, notarizes, staples, and
# wraps ω into a DMG, then attaches it to the GitHub Release that matches
# the tag (creates the release if it doesn't exist).
#
# Required secrets (Settings → Secrets and variables → Actions → Repository secrets):
#   APPLE_DEV_ID_CERT_BASE64      base64 of the Developer ID Application .p12
#                                   (export from Keychain Access → My Certificates,
#                                    then `base64 -i cert.p12 | pbcopy`)
#   APPLE_DEV_ID_CERT_PASSWORD    password used when exporting the .p12
#   APPLE_DEV_ID                  full string: "Developer ID Application: Name (TEAMID)"
#   APPLE_TEAM_ID                 10-char Apple team id
#   APPLE_ID_EMAIL                apple id for notarytool
#   APPLE_ID_APP_PASSWORD         app-specific password from appleid.apple.com

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Must already exist on origin."
        required: true
        type: string

permissions:
  contents: write  # needed to create / upload to a release

jobs:
  release:
    name: Build + notarize + attach DMG
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Derive tag + version
        id: ver
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG"             >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}"     >> "$GITHUB_OUTPUT"

      - name: Install tooling
        run: brew install xcodegen create-dmg

      - name: Import Developer ID cert into an ephemeral keychain
        env:
          CERT_B64: ${{ secrets.APPLE_DEV_ID_CERT_BASE64 }}
          CERT_PW:  ${{ secrets.APPLE_DEV_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN=build.keychain
          KEYCHAIN_PW="$(uuidgen)"
          echo "$CERT_B64" | base64 --decode > /tmp/cert.p12

          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import /tmp/cert.p12 \
            -k "$KEYCHAIN" \
            -P "$CERT_PW" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain

          rm -f /tmp/cert.p12

      - name: Register notarytool keychain profile
        env:
          APPLE_ID_EMAIL:        ${{ secrets.APPLE_ID_EMAIL }}
          APPLE_ID_APP_PASSWORD: ${{ secrets.APPLE_ID_APP_PASSWORD }}
          APPLE_TEAM_ID:         ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool store-credentials llmab-notary \
            --apple-id "$APPLE_ID_EMAIL" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_ID_APP_PASSWORD"

      - name: Build + sign + notarize + staple + DMG
        env:
          DEV_ID:         ${{ secrets.APPLE_DEV_ID }}
          TEAM_ID:        ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_PROFILE: llmab-notary
        run: make package

      - name: Locate DMG
        id: dmg
        run: |
          path="$(ls build/LLMAB-*.dmg | head -1)"
          test -f "$path" || { echo "::error::no DMG produced"; exit 1; }
          echo "path=$path" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$path")" >> "$GITHUB_OUTPUT"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name:     ω ${{ steps.ver.outputs.version }}
          draft:    true
          generate_release_notes: true
          files: |
            ${{ steps.dmg.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
