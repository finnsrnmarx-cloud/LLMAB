name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-build:
    name: Swift build & test (macOS)
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      # CLI + transitive libs (LLMCore, RuntimeOllama, RuntimeMLX,
      # RuntimeLlamaCpp, ModelRegistry).
      - name: Build llmab CLI
        run: swift build -c debug --product llmab

      # Standalone library targets not pulled in by the CLI. Each runs as its
      # own step so a failure points at one module.
      - name: Build UIKitOmega
        run: swift build -c debug --target UIKitOmega
      - name: Build AgentKit
        run: swift build -c debug --target AgentKit
      - name: Build MediaKit
        run: swift build -c debug --target MediaKit
      - name: Build RuntimeMLX
        run: swift build -c debug --target RuntimeMLX
      - name: Build RuntimeLlamaCpp
        run: swift build -c debug --target RuntimeLlamaCpp

      - name: Test
        run: swift test --parallel

  app-build:
    name: xcodebuild LLMABApp (macOS app bundle)
    runs-on: macos-latest
    timeout-minutes: 20
    needs: swift-build
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate xcodeproj
        run: xcodegen generate

      # Ad-hoc sign (CODE_SIGN_IDENTITY="-") for CI — the release build
      # happens locally on the signing Mac via scripts/package.sh.
      - name: Build LLMAB.app (Debug)
        run: |
          xcodebuild -project LLMAB.xcodeproj \
              -scheme LLMABApp \
              -configuration Debug \
              -derivedDataPath build/DerivedData \
              CODE_SIGN_IDENTITY="-" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              build

      - name: Confirm .app bundle assembled
        run: |
          test -d "build/DerivedData/Build/Products/Debug/LLMAB.app" \
            && echo "✓ LLMAB.app exists" \
            || { echo "✗ LLMAB.app missing"; exit 1; }

  lint:
    name: SwiftLint
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint || true
      - name: Run SwiftLint
        run: swiftlint --strict || true
